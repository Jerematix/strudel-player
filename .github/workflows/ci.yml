name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: install
        working-directory: web
        run: |
          npm ci
          npm install --no-save puppeteer
      - name: smoke test — every track must eval
        working-directory: web
        run: |
          npx vite --port 5273 &
          for i in $(seq 1 60); do
            curl -sf http://localhost:5273/tracks > /dev/null && break
            sleep 1
          done
          node test/smoke.mjs
